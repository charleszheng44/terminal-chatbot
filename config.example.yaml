# tchat configuration
# Copy this file to ~/.config/tchat/config.yaml and fill in your API keys.

# The default model to use when none is specified.
# Format: provider/model
default_model: openai/gpt-4o

# Default parameters for chat requests.
defaults:
  temperature: 0.7
  max_tokens: 4096
  streaming: true
  system_prompt: ""

# Provider configurations.
# Each provider requires an api_key and a list of available models.
providers:
  openai:
    api_key: "sk-..."
    models:
      - gpt-4o
      - gpt-4o-mini
      - o1

  anthropic:
    api_key: "sk-ant-..."
    models:
      - claude-sonnet-4-20250514
      - claude-haiku-4-20250414

  gemini:
    api_key: "AI..."
    models:
      - gemini-2.0-flash
      - gemini-2.5-pro

  # Providers with a base_url are treated as OpenAI-compatible.
  deepseek:
    api_key: "sk-..."
    base_url: "https://api.deepseek.com/v1"
    models:
      - deepseek-chat
      - deepseek-reasoner

# Aliases provide short names for provider/model pairs.
# Use them with: tchat -m claude
aliases:
  gpt: openai/gpt-4o
  claude: anthropic/claude-sonnet-4-20250514
  fast: openai/gpt-4o-mini
